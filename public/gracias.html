<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Mensaje Enviado! – Formulario de Contacto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="encabezado">
    <div class="contenedor">
      <h1 class="encabezado__titulo">📬 Contáctanos</h1>
    </div>
  </header>

  <main class="principal">
    <div class="contenedor">
      <section class="seccion-exito" aria-labelledby="titulo-exito">
        <div class="tarjeta-exito">
          <div class="exito__icono" aria-hidden="true">✅</div>
          <h2 class="exito__titulo" id="titulo-exito">¡Mensaje enviado con éxito!</h2>
          <p class="exito__mensaje">
            Gracias por contactarnos. Hemos recibido tu mensaje y te responderemos
            a la brevedad posible.
          </p>
          <a href="/" class="boton boton--secundario">← Volver al formulario</a>
        </div>
      </section>
    </div>
  </main>

  <footer class="pie">
    <div class="contenedor">
      <p>© 2024 Demo Colaboración Técnica. Todos los derechos reservados.</p>
    </div>
  </footer>
</body>
</html>
